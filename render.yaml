services:
  - type: web
    name: broll-mp4-webapp
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FISH_AUDIO_MODEL
        value: s2-pro
      - key: MAX_UPLOAD_MB
        value: 300
